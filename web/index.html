<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Route Safety</title>
  <style>
    body { font-family: system-ui; margin: 0; }
    header { padding: 12px 14px; background:#111; color:#fff; }
    main { padding: 12px 14px; }
    .row { display:flex; gap:8px; margin:8px 0; }
    input { flex:1; padding:10px; font-size:16px; }
    button { padding:10px 12px; font-size:16px; }
    .card { background:#f5f5f5; padding:10px 12px; border-radius:10px; margin-top:10px; }
    iframe { width:100%; height:70vh; border:0; border-radius:12px; background:#fff; }
   
  </style>
  <link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#111111"/>
</head>
<body>
  <header>
    <div style="font-weight:700">路線風險分析系統</div>
  </header>

  <main>
    <div class="row">
      <input id="start" value="輸入出發地" />
      <input id="end" value="輸入目的地" />
    </div>
    <div class="row">
      <button id="run">開始分析</button>
    </div>

    <div class="card" id="summary" style="display:none"></div>
    <iframe id="map"></iframe>
  </main>

  <script>
  const API_BASE = "";
  const $ = (id) => document.getElementById(id);

  $("run").addEventListener("click", async () => {
    try {
      const start = $("start").value.trim();
      const end = $("end").value.trim();

      if (!start || !end) {
        $("summary").style.display = "block";
        $("summary").innerHTML = "請輸入起點與終點";
        return;
      }

      $("summary").style.display = "block";
      $("summary").innerHTML = "分析中. . .";

      const res = await fetch(`/analyze`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ start, end })
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        $("summary").innerHTML = "後端回傳不是 JSON：<br>" + text;
        return;
      }

      if (!res.ok) {
        $("summary").innerHTML = "後端錯誤：<br>" + JSON.stringify(data);
        return;
      }

      if (data.error) {
        $("summary").innerHTML = "分析失敗：<br>" + data.error;
        return;
      }

      $("summary").innerHTML = `
        <div><b>🏁 最快</b>：路線 #${data.fastest.route_idx}｜${data.fastest.duration_min} 分</div>
        <div style="margin-top:6px"><b>🛡 最安全</b>：路線 #${data.safest.route_idx}｜${data.safest.duration_min} 分</div>
      `;

      const blob = new Blob([data.map_html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      $("map").src = url;

    } catch (err) {
      $("summary").style.display = "block";
      $("summary").innerHTML = "前端請求失敗：<br>" + err;
      console.error(err);
    }
  });
</script>
</body>
</html>
