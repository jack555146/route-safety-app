<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Route Safety</title>
  <style>
    body { font-family: system-ui; margin: 0; }
    header { padding: 12px 14px; background:#111; color:#fff; }
    main { padding: 12px 14px; }
    .row { display:flex; gap:8px; margin:8px 0; }
    input { flex:1; padding:10px; font-size:16px; }
    button { padding:10px 12px; font-size:16px; }
    .card { background:#f5f5f5; padding:10px 12px; border-radius:10px; margin-top:10px; }
    iframe { width:100%; height:70vh; border:0; border-radius:12px; background:#fff; }
   
  </style>
  <link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#111111"/>
</head>
<body>
  <header>
    <div style="font-weight:700">路線風險分析系統</div>
  </header>

  <main>
    <div class="row">
      <input id="start" value="輸入出發地" />
      <input id="end" value="輸入目的地" />
    </div>
    <div class="row">
      <button id="run">開始分析</button>
    </div>

    <div class="card" id="summary" style="display:none"></div>
    <iframe id="map"></iframe>
  </main>

 <script>
const $ = (id) => document.getElementById(id);

async function postAnalyze(payload, retries = 1) {
  try {
    const res = await fetch("/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });
    return res;
  } catch (err) {
    if (retries > 0) {
      await new Promise(r => setTimeout(r, 2500));
      return postAnalyze(payload, retries - 1);
    }
    throw err;
  }
}

$("run").addEventListener("click", async () => {
  try {
    const start = $("start").value.trim();
    const end = $("end").value.trim();

    if (!start || !end) {
      $("summary").style.display = "block";
      $("summary").innerHTML = "請輸入起點與終點";
      return;
    }

    $("summary").style.display = "block";
    $("summary").innerHTML = "分析中...";
    $("map").srcdoc = "";

    const res = await postAnalyze({ start, end });

    let data;
    try {
      data = await res.json();
    } catch (err) {
      $("summary").innerHTML = "伺服器暫時沒有正常回應，請稍後再試一次。";
      return;
    }

    if (data.error) {
      $("summary").innerHTML = "分析失敗：<br>" + data.error;
      return;
    }

    let noticeHtml = "";
    if (data.notice) {
      noticeHtml = `<div style="margin-bottom:8px;color:#b45309;">⚠ ${data.notice}</div>`;
    }

    $("summary").innerHTML = `
      ${noticeHtml}
      <div><b>🏁 最快</b>：路線 #${data.fastest.route_idx}｜${data.fastest.duration_min} 分</div>
      <div style="margin-top:6px"><b>🛡 最安全</b>：路線 #${data.safest.route_idx}｜${data.safest.duration_min} 分</div>
    `;

    $("map").srcdoc = data.map_html;

  } catch (err) {
    $("summary").style.display = "block";
    $("summary").innerHTML = "前端請求失敗：<br>" + err;
    console.error(err);
  }
});
</script>
</body>
</html>
